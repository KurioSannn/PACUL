info:
  title: PACUL Backend API
  description: REST API for the PACUL circular waste marketplace (hackathon MVP).
  version: 1.0.0-hackathon
  contact: {}
tags: []
servers:
  - url: http://localhost:4000
    description: Local development
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
      description: Supabase access token from sign-in
  schemas:
    ClassifyWasteDto:
      type: object
      properties: {}
    OverrideClassificationDto:
      type: object
      properties: {}
    CompleteProfileDto:
      type: object
      properties:
        role:
          type: string
          enum:
            - household
            - collector
            - industry
        displayName:
          type: string
          example: Budi Santoso
        phone:
          type: string
          example: "+6281234567890"
        avatarUrl:
          type: string
          format: uri
      required:
        - role
        - displayName
    SetHandledCategoriesDto:
      type: object
      properties: {}
    CreateWasteListingDto:
      type: object
      properties: {}
    CancelListingDto:
      type: object
      properties: {}
    UpdateWasteListingDto:
      type: object
      properties: {}
    CreateMaterialBatchDto:
      type: object
      properties: {}
    UpdateMaterialBatchDto:
      type: object
      properties: {}
    AddSourceListingsDto:
      type: object
      properties: {}
    SendTextMessageDto:
      type: object
      properties:
        content:
          type: string
          maxLength: 5000
          example: Can you deliver within 3 days?
      required:
        - content
    SendOfferDto:
      type: object
      properties:
        price_per_kg:
          type: number
          example: 3200
          minimum: 0.001
          description: Offered price per kg in IDR
        weight_kg:
          type: number
          example: 80
          minimum: 0.001
          description: Offered weight in kg
      required:
        - price_per_kg
        - weight_kg
    CancelNegotiationDto:
      type: object
      properties:
        reason:
          type: string
          maxLength: 1000
          description: Optional cancellation reason
    CreateOrderDto:
      type: object
      properties:
        batchId:
          type: string
          format: uuid
          description: Material batch to purchase
        requested_weight_kg:
          type: number
          example: 100
          minimum: 0.001
          description: Requested weight in kg
        offered_price_per_kg:
          type: number
          example: 3500
          minimum: 0
          description: Offered price per kg in IDR
        notes:
          type: string
          maxLength: 1000
          description: Optional order notes
      required:
        - batchId
        - requested_weight_kg
        - offered_price_per_kg
    UpdateOrderStatusDto:
      type: object
      properties:
        status:
          type: string
          enum:
            - negotiating
            - accepted
            - rejected
            - cancelled
            - completed
          description: Target order status
        cancel_reason:
          type: string
          maxLength: 1000
          description: Required when cancelling
        final_price_per_kg:
          type: number
          minimum: 0
          description: Final agreed price per kg in IDR
        final_weight_kg:
          type: number
          minimum: 0.001
          description: Final agreed weight in kg
      required:
        - status
    CreatePickupClaimDto:
      type: object
      properties: {}
    UpdatePickupClaimStatusDto:
      type: object
      properties: {}
    SubmitRatingDto:
      type: object
      properties: {}
    ChannelAuthDto:
      type: object
      properties: {}
    ExportPdfDto:
      type: object
      properties:
        from_date:
          type: string
          format: date-time
          example: 2025-01-01T00:00:00.000Z
        to_date:
          type: string
          format: date-time
          example: 2025-12-31T23:59:59.999Z
        city:
          type: string
          maxLength: 120
          example: Surabaya
    ExportExcelDto:
      type: object
      properties:
        type:
          type: string
          enum:
            - transactions
            - materials
            - routes
          description: Excel report type to generate
        from_date:
          type: string
          format: date-time
        to_date:
          type: string
          format: date-time
      required:
        - type
    RoutePreviewDto:
      type: object
      properties: {}
    CommitRouteDto:
      type: object
      properties: {}
    UpdateRouteStatusDto:
      type: object
      properties: {}
    UpdateStopStatusDto:
      type: object
      properties: {}
